name: skema-gateway-tests

services:
  local-pg:
    image: timescale/timescaledb-ha:pg16
    container_name: skema-test-local-pg
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: skema_local
    ports:
      - "54541:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skema_local"]
      interval: 2s
      timeout: 2s
      retries: 30

  parallax-pg:
    image: timescale/timescaledb-ha:pg16
    container_name: skema-test-parallax-pg
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: parallax
    ports:
      - "54542:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parallax"]
      interval: 2s
      timeout: 2s
      retries: 30

  privatae-pg:
    image: postgres:16
    container_name: skema-test-privatae-pg
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: privatae
    ports:
      - "54543:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d privatae"]
      interval: 2s
      timeout: 2s
      retries: 30
